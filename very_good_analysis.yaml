# Strict lint baseline (CI copies it as the test project's analysis_options.yaml).
# With Flutter installed locally you can also use: flutter pub add --dev very_good_analysis
include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-raw-types: true
  errors:
    # Common hazards in animation code — promoted to errors; if CI fails them, the entry isn't included
    cancel_subscriptions: error
    close_sinks: error
    unawaited_futures: error

linter:
  rules:
    - prefer_const_constructors
    - prefer_const_declarations
    - use_key_in_widget_constructors
    - avoid_unnecessary_containers
    - sized_box_for_whitespace
