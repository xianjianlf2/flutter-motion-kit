name: verify

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 1 * *' # re-verify on the 1st of each month to catch deprecations in new Flutter releases early

jobs:
  catalog:
    name: schema + catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: BUILD_TIME="$(date -u +%FT%TZ)" node scripts/build-catalog.mjs

  flutter:
    name: analyze · format · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        # Pin to the version the content is verified against (verifiedOn), so format/analyze are
        # authoritative and deterministic. The monthly cron is what surfaces drift on newer releases.
        with: { channel: stable, flutter-version: 3.32.0 }
      - name: Verify every snippet compiles & is idiomatic
        run: |
          set -e
          flutter create --platforms=web _verify >/dev/null
          cp very_good_analysis.yaml _verify/analysis_options.yaml 2>/dev/null || true
          fail=0
          for dart in content/animations/*/main.dart; do
            echo "::group::$dart"
            cp "$dart" _verify/lib/main.dart
            dart format --output=none --set-exit-if-changed "$dart" || { echo "format: $dart"; fail=1; }
            (cd _verify && flutter analyze lib/main.dart) || { echo "analyze: $dart"; fail=1; }
            (cd _verify && flutter build web --no-pub >/dev/null) || { echo "build: $dart"; fail=1; }
            echo "::endgroup::"
          done
          # bad.dart is a "cautionary example": it intentionally violates lint rules (missing dispose, etc.), so we only check that it compiles —
          # this rules out hallucinated APIs / syntax errors, ensuring the counter-examples on the site actually run.
          for dart in content/animations/*/bad.dart; do
            echo "::group::$dart (build-only)"
            cp "$dart" _verify/lib/main.dart
            (cd _verify && flutter build web --no-pub >/dev/null) || { echo "build: $dart"; fail=1; }
            echo "::endgroup::"
          done
          exit $fail
