name: deploy

# Pushing content/code changes to main automatically redeploys the site + Worker.
# Requires the following in the repo Settings:
#   Secrets:   CLOUDFLARE_API_TOKEN (Workers + Pages + KV edit permissions)
#              CLOUDFLARE_ACCOUNT_ID
#              WRANGLER_TOML (the full contents of worker/wrangler.toml, including the real KV id — so it doesn't have to live in the repo)
#   Variables: PUBLIC_MCP_ORIGIN (your Worker URL, e.g. https://flutter-motion-kit.xxx.workers.dev)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  site:
    name: deploy site (Cloudflare Pages)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: subosito/flutter-action@v2
        with: { channel: stable, flutter-version: 3.32.0 }
      - run: npm ci
      # Self-hosted previews: compile each main.dart into runnable Flutter web and deploy it alongside the site
      - run: npm run previews
      - run: npm run site:build
        env:
          PUBLIC_MCP_ORIGIN: ${{ vars.PUBLIC_MCP_ORIGIN }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=flutter-motion-kit --branch=main

  worker:
    name: deploy MCP worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
      - run: node scripts/build-catalog.mjs && npm -w mcp run build
      # Private config isn't in the repo: restore worker/wrangler.toml from the secret
      # Passed via env to keep double quotes in the secret from truncating the shell string (lost quotes -> wrangler parse error)
      - run: printf '%s' "$WRANGLER_TOML" > worker/wrangler.toml
        env:
          WRANGLER_TOML: ${{ secrets.WRANGLER_TOML }}
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
