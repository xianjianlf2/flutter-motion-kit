<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flutter Motion Kit — previewable Flutter animations</title>
<meta name="description" content="Machine-verified Flutter animations you can preview live (real running Flutter web), each with sourced pitfalls, and reuse from Claude Code / Cursor via MCP.">
<link rel="canonical" href="https://motion.markxian.cn/">
<meta property="og:type" content="website">
<meta property="og:title" content="Flutter Motion Kit — previewable Flutter animations">
<meta property="og:description" content="Machine-verified Flutter animations you can preview live, with sourced pitfalls — reuse from Claude Code / Cursor via MCP.">
<meta property="og:url" content="https://motion.markxian.cn/">
<meta property="og:image" content="https://motion.markxian.cn/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Flutter Motion Kit">
<meta name="twitter:description" content="Previewable, machine-verified Flutter animations — reuse via MCP.">
<meta name="twitter:image" content="https://motion.markxian.cn/og.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d1117; --panel:#161b22; --border:#30363d; --border2:#21262d; --text:#e6edf3; --muted:#8b949e; --muted2:#6e7681; --accent:#4dd0e1; --good:#3fb950; --warn:#d29922; }
  * { box-sizing:border-box; }
  html, body { background:var(--bg); color:var(--text); font-family:'Inter',system-ui,sans-serif; margin:0; -webkit-font-smoothing:antialiased; }
  a { color:inherit; }
  .mono { font-family:'JetBrains Mono',ui-monospace,Menlo,monospace; }
  ::-webkit-scrollbar { width:10px; height:10px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:6px; border:2px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background:var(--border); }
  @keyframes livepulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }
  .live-dot { animation:livepulse 1.6s infinite; }
  @keyframes toastIn { from { opacity:0; transform:translateY(8px) translateX(-50%) } to { opacity:1; transform:translateY(0) translateX(-50%) } }
  .toast { animation:toastIn 0.18s ease-out; }
  .navlink { transition:color .12s; text-decoration:none; }
  .navlink:hover { color:var(--text) !important; }
  .hero-bg { background:radial-gradient(900px 360px at 12% -10%, rgba(77,208,225,0.10), transparent 60%), radial-gradient(700px 300px at 95% 10%, rgba(63,185,150,0.06), transparent 60%); }
  .act { cursor:pointer; font-size:13px; font-weight:600; padding:9px 16px; border-radius:8px; border:1px solid var(--border); background:var(--panel); color:var(--text); text-decoration:none; display:inline-flex; align-items:center; gap:8px; transition:transform .12s, border-color .12s; }
  .act:hover { transform:translateY(-1px); border-color:var(--accent); }
  .act.primary { background:var(--accent); color:#06121f; border:none; }
  .chip { cursor:pointer; font-size:12px; padding:5px 11px; border-radius:999px; background:var(--panel); border:1px solid var(--border); color:var(--muted); text-transform:lowercase; }
  .chip[aria-pressed=true] { color:var(--accent); border-color:var(--accent); background:rgba(77,208,225,0.10); }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; cursor:pointer; display:flex; flex-direction:column; gap:10px; min-height:170px; transition:transform .18s, border-color .18s; text-decoration:none; color:inherit; }
  .card:hover { transform:translateY(-2px); border-color:var(--accent); }
  .card .accent { height:3px; border-radius:3px; margin:-4px -4px 4px; }
  .badge { font-size:11px; padding:2px 8px; border-radius:999px; background:var(--border2); color:var(--muted); border:1px solid var(--border); }
  iframe.preview { width:100%; height:520px; border:1px solid var(--border); border-radius:12px; background:#1e1e1e; }
  pre.code { background:var(--panel); border:1px solid var(--border); border-radius:12px; padding:16px; overflow:auto; font-size:12.5px; line-height:1.65; margin:0; min-width:0; }
  .pitfall { padding:14px 16px; border:1px solid var(--border); border-left:3px solid var(--warn); border-radius:8px; margin:10px 0; background:var(--panel); }
  .pitfall .fix { color:var(--good); margin-top:6px; font-size:13px; }
  .pitfall .src { color:var(--muted); font-size:12px; margin-top:6px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .conf { font-size:11px; padding:1px 8px; border-radius:999px; border:1px solid var(--border); }
  h1.hl { font-size:44px; line-height:1.05; font-weight:700; letter-spacing:-1px; margin:0; max-width:820px; }
  .wrap { max-width:1200px; margin:0 auto; padding:0 32px; }
  @media (max-width:760px) {
    header { padding:12px 18px !important; }
    header nav { display:none !important; }
    .wrap { padding:0 18px; }
    h1.hl { font-size:30px; letter-spacing:-0.5px; }
    .dcol { grid-template-columns:1fr !important; }
    .dcol > div { min-width:0; }
    iframe.preview { height:380px; }
  }
</style>
</head>
<body>

<header style="position:sticky; top:0; z-index:20; backdrop-filter:blur(8px); background:rgba(13,17,23,0.85); border-bottom:1px solid var(--border2); padding:12px 32px; display:flex; align-items:center; gap:16px">
  <a href="#/" style="display:flex; align-items:center; gap:10px; text-decoration:none; color:inherit">
    <div style="width:26px; height:26px; border-radius:7px; background:conic-gradient(from 230deg at 50% 50%, #4dd0e1, #3fb950, #d29922, #4dd0e1); box-shadow:0 0 0 1px #21262d inset"></div>
    <div style="display:flex; flex-direction:column; line-height:1">
      <span style="font-size:13px; font-weight:600">Flutter Motion Kit</span>
      <span class="mono" style="font-size:10px; color:var(--muted2); margin-top:2px">v3.32.0</span>
    </div>
  </a>
  <nav style="display:flex; gap:18px; margin-left:24px; font-size:13px">
    <a href="/gallery" class="navlink" style="color:var(--muted)">Gallery</a>
    <a href="/docs" class="navlink" style="color:var(--muted)">Docs</a>
    <a href="/verifier" class="navlink" style="color:var(--muted)">Verifier</a>
    <a href="/changelog" class="navlink" style="color:var(--muted)">Changelog</a>
  </nav>
  <div style="margin-left:auto; display:flex; gap:8px; align-items:center">
    <a href="/connect" class="act" style="padding:6px 12px; font-size:12px">Connect</a>
  </div>
</header>

<main id="app"><div class="wrap mono" style="padding:80px 32px; color:var(--muted2)">Loading catalog…</div></main>

<div id="toast" class="toast mono" style="display:none; position:fixed; bottom:24px; left:50%; background:var(--panel); border:1px solid var(--accent); color:var(--accent); padding:8px 14px; border-radius:8px; font-size:12px; z-index:50; box-shadow:0 12px 40px -10px rgba(77,208,225,0.35)"></div>

<script>
const MCP = 'https://mcp.markxian.cn/mcp';
const CAT_COLOR = { implicit:'#4dd0e1', explicit:'#3fb950', hero:'#d29922', staggered:'#bc8cff', physics:'#ff7b72', 'custom-painter':'#79c0ff', 'rive-lottie':'#f0883e' };
const esc = (s) => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
let CATALOG = [], CATS = [], FILTER = 'all', Q = '';

const app = document.getElementById('app');
const toast = document.getElementById('toast');
let _tt;
function flash(msg){ toast.textContent = '✓ ' + msg; toast.style.display='block'; clearTimeout(_tt); _tt=setTimeout(()=>toast.style.display='none',1600); }
function copy(text, label){ navigator.clipboard.writeText(text).then(()=>flash(label)).catch(()=>{}); }

// Light Dart syntax tinting
function tintDart(src){
  const re = /(\/\/[^\n]*)|('[^'\n]*'|"[^"\n]*")|(\b(?:final|const|return|class|extends|with|new|void|if|else|for|var|late|true|false|null|this|super|override|import|as)\b)|(\b(?:int|double|String|bool|List|Map|Offset|Duration|Color|Colors|Curves|BoxDecoration|BorderRadius|SizedBox|Container|Material|Widget|Tween|CurveTween|CurvedAnimation|Interval|FadeTransition|SlideTransition|RotationTransition|ScaleTransition|SizeTransition|AnimationController|Animation|Hero|PageRouteBuilder|Navigator|SpringDescription|SpringSimulation|Transform|Matrix4|AnimatedBuilder|AnimatedContainer|AnimatedSize|AnimatedList|Dismissible|CustomPainter|CustomPaint|Canvas|Size|Paint|PaintingStyle|StrokeCap|GlobalKey|ScrollController|CustomScrollView|SliverAppBar|FlexibleSpaceBar|SliverList|DraggableScrollableSheet|GestureDetector|State|StatefulWidget|StatelessWidget|MaterialApp|Scaffold|BuildContext|ShaderMask)\b)|(\b\d+(?:\.\d+)?\b)/g;
  let out='', last=0, m;
  const C = { c1:'#7d8590', c2:'#a5d6ff', c3:'#ff7b72', c4:'#79c0ff', c5:'#f0883e' };
  while((m=re.exec(src))!==null){
    if(m.index>last) out += esc(src.slice(last,m.index));
    const col = m[1]?C.c1 : m[2]?C.c2 : m[3]?C.c3 : m[4]?C.c4 : C.c5;
    out += '<span style="color:'+col+'">'+esc(m[0])+'</span>';
    last = re.lastIndex;
  }
  out += esc(src.slice(last));
  return out;
}

function aiPrompt(e){
  const pf = e.pitfalls.map((p,i)=>`${i+1}. ${p.claim} — ${p.fix}`).join('\n');
  return `I want exactly this Flutter animation effect: ${e.title} (${e.category}).\n\n`
    + `Implement it in my project using the reference below, and you MUST follow every pitfall.\n`
    + `For the verified, lint-passing implementation prefer the flutter-motion MCP `
    + `(search_flutter_animation for a "${e.category}" animation, then get_animation), or see https://motion.markxian.cn/gallery .\n\n`
    + '```dart\n' + e.code.trim() + '\n```\n\nPitfalls (do not violate):\n' + pf + `\n\n(verified ${e.verifiedOn})`;
}

function renderHome(){
  const q = Q.trim().toLowerCase();
  const list = CATALOG.filter(e => (FILTER==='all'||e.category===FILTER)
    && (!q || e.title.toLowerCase().includes(q) || e.summary.toLowerCase().includes(q) || (e.tags||[]).some(t=>t.includes(q))));
  const totalPitfalls = CATALOG.reduce((a,e)=>a+e.pitfalls.length,0);
  app.innerHTML = `
    <section class="hero-bg" style="padding:64px 0 40px; border-bottom:1px solid var(--border2)">
      <div class="wrap">
        <div class="mono" style="color:var(--accent); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-bottom:14px">// flutter_motion_kit</div>
        <h1 class="hl">Flutter animations you can <span style="color:var(--accent)">preview</span>, <span style="color:var(--good)">copy</span>, and <span style="color:var(--warn)">trust</span>.</h1>
        <p style="font-size:16px; color:var(--muted); max-width:680px; margin-top:16px; line-height:1.5">Every entry runs live in your browser as real Flutter web — not a recording — ships copy-paste code, and carries sourced pitfalls. Reuse them straight from Claude Code / Cursor via MCP.</p>
        <div style="display:flex; gap:10px; margin-top:26px; flex-wrap:wrap; align-items:center">
          <a class="act primary" id="add-cursor">＋ Add to Cursor</a>
          <a class="act" id="add-vscode">＋ Add to VS Code</a>
          <button class="act" id="add-cc"><span class="mono">$</span> Copy Claude Code command</button>
          <div id="devs" class="mono" style="display:none; align-items:center; gap:8px; font-size:12px; color:var(--muted); padding:7px 12px; background:var(--bg); border:1px solid var(--border2); border-radius:999px">
            <span class="live-dot" style="width:7px; height:7px; border-radius:50%; background:var(--good); box-shadow:0 0 8px var(--good)"></span><span id="devs-text"></span>
          </div>
        </div>
        <div class="mono" style="display:flex; gap:28px; margin-top:32px; font-size:12px; color:var(--muted2)">
          <div><span style="color:var(--text)">${CATALOG.length}</span> verified entries</div>
          <div><span style="color:var(--text)">${totalPitfalls}</span> sourced pitfalls</div>
          <div>verified <span style="color:var(--text)">Flutter 3.32 / 2026-06</span></div>
        </div>
      </div>
    </section>
    <section style="padding:24px 0 8px"><div class="wrap" style="display:flex; gap:16px; align-items:center; flex-wrap:wrap">
      <input id="search" placeholder="Search animations, tags…" value="${esc(Q)}" style="background:var(--panel); border:1px solid var(--border); border-radius:8px; padding:8px 12px; font-size:13px; color:var(--text); width:260px">
      <div style="display:flex; gap:6px; flex-wrap:wrap">
        <span class="chip" data-cat="all" aria-pressed="${FILTER==='all'}">all</span>
        ${CATS.map(c=>`<span class="chip mono" data-cat="${c}" aria-pressed="${FILTER===c}">${c}</span>`).join('')}
      </div>
      <div style="margin-left:auto; font-size:12px; color:var(--muted2)">${list.length} of ${CATALOG.length}</div>
    </div></section>
    <section style="padding:20px 0 80px"><div class="wrap" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:18px">
      ${list.map(e=>`
        <a class="card" href="#/a/${e.id}">
          <div class="accent" style="background:${CAT_COLOR[e.category]||'#8b949e'}"></div>
          <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:8px">
            <h3 style="font-size:15px; font-weight:600; margin:0">${esc(e.title)}</h3>
            <span class="mono" style="font-size:10px; color:var(--muted2); flex-shrink:0">${'●'.repeat(e.difficulty)}<span style="color:var(--border)">${'●'.repeat(5-e.difficulty)}</span></span>
          </div>
          <p style="font-size:12.5px; color:var(--muted); margin:0; line-height:1.45; flex:1">${esc(e.summary.trim())}</p>
          <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center">
            <span class="badge mono" style="color:${CAT_COLOR[e.category]||'#8b949e'}">${e.category}</span>
            <span class="badge">⚠ ${e.pitfalls.length}</span>
            <span class="mono" style="margin-left:auto; font-size:11px; color:var(--accent)">▶ live preview</span>
          </div>
        </a>`).join('')}
    </div></section>`;

  // wire install buttons
  const cfg = JSON.stringify({ url: MCP });
  document.getElementById('add-cursor').href = 'cursor://anysphere.cursor-deeplink/mcp/install?name=flutter-motion&config=' + btoa(cfg);
  document.getElementById('add-vscode').href = 'https://insiders.vscode.dev/redirect/mcp/install?name=flutter-motion&config=' + encodeURIComponent(cfg);
  document.getElementById('add-cc').onclick = () => copy('claude mcp add --transport http flutter-motion ' + MCP, 'Claude Code command copied');
  // filters
  app.querySelectorAll('.chip').forEach(c => c.onclick = () => { FILTER = c.dataset.cat; renderHome(); });
  const s = document.getElementById('search');
  s.oninput = () => { Q = s.value; const pos = s.selectionStart; renderHome(); const ns = document.getElementById('search'); ns.focus(); ns.setSelectionRange(pos,pos); };
  loadDevs();
}

function renderDetail(id){
  const e = CATALOG.find(x => x.id === id);
  if(!e){ location.hash = '#/'; return; }
  const meta = CAT_COLOR[e.category] || '#8b949e';
  app.innerHTML = `
    <section style="padding:24px 0; border-bottom:1px solid var(--border2)"><div class="wrap">
      <a href="#/" class="mono" style="font-size:12px; color:var(--muted); text-decoration:none">← all animations</a>
      <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:24px; flex-wrap:wrap; margin-top:12px">
        <div>
          <div class="mono" style="font-size:11px; color:${meta}; text-transform:uppercase; letter-spacing:1px">${e.category} · difficulty ${e.difficulty}/5 · verified ${esc(e.verifiedOn)}</div>
          <h1 style="font-size:28px; font-weight:700; margin:8px 0 0; letter-spacing:-0.5px">${esc(e.title)}</h1>
          <p style="font-size:14px; color:var(--muted); margin:6px 0 0; max-width:620px; line-height:1.5">${esc(e.summary.trim())}</p>
        </div>
        <button class="act primary" id="copy-ai" style="flex-shrink:0">📋 Copy for AI (code + pitfalls)</button>
      </div>
    </div></section>
    <section style="padding:24px 0"><div class="wrap">
      <div class="dcol" style="display:grid; grid-template-columns:minmax(0,1.15fr) minmax(0,1fr); gap:18px; align-items:start">
        <div>
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px">
            <span class="mono" style="font-size:11px; color:var(--good)">▶︎ real running Flutter (${esc(e.verifiedOn.split('/')[0].trim())} · self-hosted)</span>
            <button class="act" id="replay" style="padding:4px 10px; font-size:11px; font-weight:500">↻ Replay</button>
          </div>
          <iframe class="preview" id="preview" src="/preview/${e.id}/" title="${esc(e.title)} preview" loading="lazy"></iframe>
          <div style="display:flex; align-items:center; justify-content:space-between; margin:18px 0 8px">
            <span class="mono" style="font-size:11px; color:var(--muted)">${e.id}.dart</span>
            <button class="act" id="copy-code" style="padding:4px 10px; font-size:11px; font-weight:500">Copy code</button>
          </div>
          <pre class="code mono"><code id="code"></code></pre>
        </div>
        <div>
          <h3 style="font-size:14px; font-weight:600; margin:0 0 8px">⚠️ Pitfalls (${e.pitfalls.length})</h3>
          ${e.pitfalls.map(p=>`
            <div class="pitfall">
              <div style="font-size:13px">${esc(p.claim)}</div>
              <div class="fix">✅ ${esc(p.fix)}</div>
              <div class="src"><span class="conf mono">${esc(p.confidence)}</span>${p.source && p.source.startsWith('http') ? ` · <a href="${esc(p.source)}" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:none">source</a>` : ''}${p.provenBy ? ` · <span class="mono">proven by ${esc(p.provenBy)}</span>` : ''}</div>
            </div>`).join('')}
          ${(e.docs&&e.docs.length)?`<h3 style="font-size:14px; font-weight:600; margin:18px 0 8px">Official docs</h3><ul style="padding-left:18px; font-size:12.5px; line-height:1.7">${e.docs.map(d=>`<li><a href="${esc(d)}" target="_blank" rel="noopener" style="color:var(--accent); text-decoration:none; word-break:break-all">${esc(d)}</a></li>`).join('')}</ul>`:''}
        </div>
      </div>
    </div></section>`;
  document.getElementById('code').innerHTML = tintDart(e.code.trim());
  const pv = document.getElementById('preview');
  document.getElementById('replay').onclick = () => { pv.src = pv.src; };
  document.getElementById('copy-code').onclick = () => copy(e.code, 'Code copied');
  document.getElementById('copy-ai').onclick = () => copy(aiPrompt(e), 'Copied — paste into your AI assistant');
  window.scrollTo(0,0);
}

function loadDevs(){
  fetch('https://mcp.markxian.cn/stats').then(r=>r.json()).then(d=>{
    if(typeof d.connections==='number'){ const t=document.getElementById('devs-text'), b=document.getElementById('devs'); if(t&&b){ t.textContent = d.connections.toLocaleString()+' developers connected'; b.style.display='inline-flex'; } }
  }).catch(()=>{});
}

function route(){ const m = location.hash.match(/^#\/a\/(.+)$/); if(m) renderDetail(decodeURIComponent(m[1])); else renderHome(); }
window.addEventListener('hashchange', route);

fetch('/api/animations.json').then(r=>r.json()).then(d=>{ CATALOG = d.entries; CATS = d.categories; route(); })
  .catch(()=>{ app.innerHTML = '<div class="wrap" style="padding:80px 32px; color:var(--warn)">Failed to load catalog.</div>'; });
</script>

</body>
</html>
