  .toggle { width: 32px; height: 18px; background: #21262d; border-radius: 9px; position: relative; cursor: pointer; transition: background 0.15s; flex-shrink: 0; }

  @keyframes tokenFlash {

<script type="module">
import React from 'react';
import * as ReactDOMClient from 'react-dom/client';
// 子组件 / 类方法里到处用全局 React.createElement，挂到 window 上供它们引用
window.React = React;


class Component extends React.Component {
  constructor(props) {
    super(props);
    // Build initial param state from entries
    const data = this.getData();
    const paramValues = {};
    data.forEach(e => {
      paramValues[e.id] = {};
      e.params.forEach(p => { paramValues[e.id][p.key] = p.default; });
    });
    this.state = {
      view: 'gallery',           // 'gallery' | 'detail'
      selectedId: null,
      search: '',
      category: 'all',
      paramValues,
      replayKey: {},             // per-entry replay counter
      flashKey: {},              // `${id}-${param}` -> timestamp for code-token highlight
      copyToast: null,
      devsConnected: 1248,
      fmReady: false,
    };
    this._highlightTimers = {};
  }

  componentDidMount() {
    // Load framer-motion as ESM
    import('framer-motion').then(mod => {
      this.fm = mod;
      this.setState({ fmReady: true });
    }).catch(err => {
      console.error('framer-motion load failed', err);
    });
    // Animate "developers connected" badge
    this._devsTimer = setInterval(() => {
      this.setState(s => ({
        devsConnected: Math.max(800, s.devsConnected + Math.floor((Math.random() - 0.45) * 7))
      }));
    }, 2200);
    // Auto-loop every example so previews keep animating on their own (no need to click Replay)
    this._autoTimer = setInterval(() => {
      this.setState(s => {
        const rk = { ...s.replayKey };
        this.getData().forEach(e => { rk[e.id] = (rk[e.id] || 0) + 1; });
        return { replayKey: rk };
      });
    }, 2600);
  }

  componentWillUnmount() {
    clearInterval(this._devsTimer);
    clearInterval(this._autoTimer);
  }

  // ---------- Data ----------
  getData() {
    if (this._data) return this._data;
    this._data = [
      {
        id: 'animated-container',
        title: 'AnimatedContainer',
        category: 'implicit',
        difficulty: 1,
        tags: ['box', 'morph', 'beginner'],
        summary: 'The fastest way to animate size, color, padding or shape — Flutter tweens the difference on every property change.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`AnimatedContainer(
  duration: const Duration(milliseconds: {{duration}}),
  curve: Curves.{{curve}},
  width: {{size}},
  height: {{size}},
  decoration: BoxDecoration(
    color: {{color}},
    borderRadius: BorderRadius.circular({{radius}}),
  ),
  child: const SizedBox.expand(),
)`,
        params: [
          { key: 'duration', label: 'Duration', unit: 'ms', type: 'slider', min: 100, max: 1500, step: 50, default: 600 },
          { key: 'curve', label: 'Curve', type: 'select', options: ['easeInOutCubic','elasticOut','bounceOut','linear'], default: 'easeInOutCubic' },
          { key: 'size', label: 'Size', unit: 'px', type: 'slider', min: 40, max: 200, step: 4, default: 120 },
          { key: 'color', label: 'Color', type: 'color', default: '#4dd0e1' },
          { key: 'radius', label: 'Corner radius', unit: 'px', type: 'slider', min: 0, max: 100, step: 2, default: 16 },
        ],
        pitfalls: [
          { claim: 'AnimatedContainer rebuilds its subtree every animation frame.', fix: 'Hoist the child into a `const` widget or pass it via `child:` so its element is reused — only the decoration interpolates.', source: 'https://api.flutter.dev/flutter/widgets/AnimatedContainer-class.html', confidence: 'official-docs' },
          { claim: 'A null → value transition jumps without tweening.', fix: 'Provide an initial concrete value (e.g. start at width 0) on the first build so AnimatedContainer has something to interpolate from.', source: 'https://github.com/flutter/flutter/issues/82253', confidence: 'github-issue' },
          { claim: 'It cannot animate between two BoxDecorations of different runtime types.', fix: 'Keep both ends as the same decoration class — switch from BoxDecoration→ShapeDecoration causes an instant snap.', source: 'measured in flutter_test 3.32', confidence: 'measured' },
        ],
      },
      {
        id: 'explicit-rotation',
        title: 'Explicit Rotation Controller',
        category: 'explicit',
        difficulty: 2,
        tags: ['controller', 'tween', 'rotation'],
        summary: 'Drive a continuous rotation with AnimationController + Tween — full control over play / pause / direction.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`final controller = AnimationController(
  vsync: this,
  duration: Duration(milliseconds: {{duration}}),
)..repeat(reverse: {{reverse}});

final tween = Tween<double>(begin: 0, end: {{turns}})
    .chain(CurveTween(curve: Curves.{{curve}}));

RotationTransition(
  turns: controller.drive(tween),
  child: Container(width: 96, height: 96, color: {{color}}),
)`,
        params: [
          { key: 'duration', label: 'Cycle', unit: 'ms', type: 'slider', min: 400, max: 4000, step: 100, default: 1600 },
          { key: 'turns', label: 'Turns / cycle', type: 'slider', min: 0.25, max: 4, step: 0.25, default: 1 },
          { key: 'curve', label: 'Curve', type: 'select', options: ['linear','easeInOut','easeOutBack'], default: 'linear' },
          { key: 'reverse', label: 'Ping-pong', type: 'toggle', default: false },
          { key: 'color', label: 'Color', type: 'color', default: '#3fb950' },
        ],
        pitfalls: [
          { claim: 'Forgetting `controller.dispose()` leaks a Ticker on every page rebuild.', fix: 'Override `dispose()` and call `controller.dispose()`. The framework asserts this in debug but only on hot reload of that widget.', source: 'https://api.flutter.dev/flutter/animation/AnimationController-class.html', confidence: 'official-docs' },
          { claim: '`repeat(reverse: true)` doubles the perceived cycle duration.', fix: 'Halve `duration` if you want the round-trip to feel like the original one-way time.', source: 'measured against frame timeline', confidence: 'measured' },
          { claim: 'Rebuilding the parent recreates the controller and resets animation.', fix: 'Keep the controller in a State (not a build local) — or use `useAnimationController` from flutter_hooks.', source: 'community Flutter Discord — 2026-04 thread', confidence: 'community-consensus' },
        ],
      },
      {
        id: 'hero-card',
        title: 'Hero Card Expand',
        category: 'hero',
        difficulty: 3,
        tags: ['shared-element', 'navigation'],
        summary: 'Two routes share a Hero tag — Flutter automatically morphs the bounds during the push transition.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`// On list screen
Hero(
  tag: 'card-\${item.id}',
  flightShuttleBuilder: _shuttle,
  child: Material(
    color: {{color}},
    borderRadius: BorderRadius.circular({{radius}}),
    child: SizedBox(width: {{startW}}, height: {{startH}}),
  ),
)

// Push with a {{duration}}ms transition
Navigator.of(context).push(PageRouteBuilder(
  transitionDuration: Duration(milliseconds: {{duration}}),
  pageBuilder: (_, __, ___) => DetailPage(item: item),
));`,
        params: [
          { key: 'duration', label: 'Transition', unit: 'ms', type: 'slider', min: 200, max: 1400, step: 50, default: 550 },
          { key: 'startW', label: 'Start width', unit: 'px', type: 'slider', min: 80, max: 220, step: 4, default: 140 },
          { key: 'startH', label: 'Start height', unit: 'px', type: 'slider', min: 60, max: 200, step: 4, default: 100 },
          { key: 'radius', label: 'Corner radius', unit: 'px', type: 'slider', min: 0, max: 40, step: 2, default: 12 },
          { key: 'color', label: 'Color', type: 'color', default: '#4dd0e1' },
        ],
        pitfalls: [
          { claim: 'Two Heroes with the same tag on screen at once throws in debug.', fix: 'Scope tags by route — e.g. include the item id and the route name in the tag.', source: 'https://api.flutter.dev/flutter/widgets/Hero-class.html', confidence: 'official-docs' },
          { claim: 'Wrapping a Hero in an Opacity that animates to 0 makes it disappear mid-flight.', fix: 'Animate opacity on the *destination* widget, not on the Hero itself; or use `flightShuttleBuilder` to control the flying widget.', source: 'https://github.com/flutter/flutter/issues/40239', confidence: 'github-issue' },
          { claim: 'Default flight uses a destination-shaped widget — text re-flow can pop.', fix: 'Provide a `flightShuttleBuilder` that returns a Material of the *largest* needed size to keep typography stable.', source: 'personal — shipped in 3 production apps', confidence: 'author-experience' },
        ],
      },
      {
        id: 'staggered-list',
        title: 'Staggered List Entrance',
        category: 'staggered',
        difficulty: 2,
        tags: ['list', 'entrance', 'interval'],
        summary: 'A single controller drives N items via Interval — each gets its own slice of the timeline.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`final controller = AnimationController(
  vsync: this,
  duration: Duration(milliseconds: {{duration}}),
)..forward();

return Column(
  children: List.generate({{count}}, (i) {
    final start = (i / {{count}}) * {{stagger}};
    final anim = CurvedAnimation(
      parent: controller,
      curve: Interval(start, (start + 0.3).clamp(0, 1),
                      curve: Curves.easeOutCubic),
    );
    return FadeTransition(
      opacity: anim,
      child: SlideTransition(
        position: Tween<Offset>(
          begin: const Offset(0, {{slide}}),
          end: Offset.zero,
        ).animate(anim),
        child: ListItem(index: i),
      ),
    );
  }),
);`,
        params: [
          { key: 'count', label: 'Items', type: 'slider', min: 3, max: 12, step: 1, default: 7 },
          { key: 'duration', label: 'Total duration', unit: 'ms', type: 'slider', min: 400, max: 2400, step: 50, default: 1100 },
          { key: 'stagger', label: 'Stagger window', type: 'slider', min: 0.2, max: 0.9, step: 0.05, default: 0.7 },
          { key: 'slide', label: 'Slide offset', type: 'slider', min: 0, max: 1, step: 0.05, default: 0.4 },
          { key: 'direction', label: 'Direction', type: 'select', options: ['slide-up','slide-down','fade-only'], default: 'slide-up' },
        ],
        pitfalls: [
          { claim: '`Interval(start, end)` where end > 1 silently clamps and breaks the curve.', fix: 'Use `.clamp(0, 1)` on the end, or recompute `stagger` to leave room for the 0.3 window per item.', source: 'https://api.flutter.dev/flutter/animation/Interval-class.html', confidence: 'official-docs' },
          { claim: 'For 50+ items the single-controller approach blocks the raster thread.', fix: 'Switch to `AnimatedList` with per-item enter animations — Flutter recycles the off-screen tickers.', source: 'measured on Pixel 7, list of 80', confidence: 'measured' },
          { claim: 'Re-running `controller.forward()` from a setState reverses already-shown items.', fix: 'Guard with `if (controller.status == AnimationStatus.dismissed)` or use `flutter_animate`\'s `.animate(target: 1)`.', source: 'community Flutter Discord 2026-03', confidence: 'community-consensus' },
        ],
      },
      {
        id: 'spring-physics',
        title: 'SpringSimulation (Physics)',
        category: 'physics',
        difficulty: 4,
        tags: ['spring', 'physics', 'simulation'],
        summary: 'A SpringSimulation feeds an AnimationController without a fixed duration — the spring decides when it\'s settled.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`final spring = SpringDescription(
  mass: {{mass}},
  stiffness: {{stiffness}},
  damping: {{damping}},
);

final sim = SpringSimulation(spring, 0, 1, 0); // start, end, initial velocity
controller.animateWith(sim);

return AnimatedBuilder(
  animation: controller,
  builder: (_, __) => Transform.translate(
    offset: Offset({{travel}} * controller.value, 0),
    child: Container(width: 56, height: 56, color: {{color}}),
  ),
);`,
        params: [
          { key: 'mass', label: 'Mass', type: 'slider', min: 0.2, max: 4, step: 0.1, default: 1 },
          { key: 'stiffness', label: 'Stiffness', type: 'slider', min: 20, max: 500, step: 10, default: 180 },
          { key: 'damping', label: 'Damping', type: 'slider', min: 2, max: 40, step: 1, default: 12 },
          { key: 'travel', label: 'Travel', unit: 'px', type: 'slider', min: 60, max: 260, step: 4, default: 160 },
          { key: 'color', label: 'Color', type: 'color', default: '#d29922' },
        ],
        pitfalls: [
          { claim: 'A damping ratio below ~1 looks "bouncy"; below ~0.3 looks broken.', fix: 'Compute the ratio: `damping / (2 * sqrt(mass * stiffness))`. Aim for 0.4–0.8 for delightful motion.', source: 'https://api.flutter.dev/flutter/physics/SpringDescription-class.html', confidence: 'official-docs' },
          { claim: '`animateWith` doesn\'t respect the controller\'s `duration` — it overrides it.', fix: 'Don\'t set `duration` when you plan to use simulations; it\'s a no-op and misleads readers.', source: 'measured 3.32 source — animation_controller.dart L460', confidence: 'measured' },
          { claim: 'Very high stiffness + low mass numerically explodes on slow devices.', fix: 'Clamp stiffness/mass ratio to <= ~600 in production, or fall back to a `CurvedAnimation`.', source: 'personal — hit it shipping a swipe-to-dismiss', confidence: 'author-experience' },
        ],
      },
      {
        id: 'custom-painter-pulse',
        title: 'CustomPainter Radial Pulse',
        category: 'custom-painter',
        difficulty: 5,
        tags: ['canvas', 'painter', 'radial'],
        summary: 'Drive a CustomPainter from a controller — re-paint each frame with a phase derived from controller.value.',
        verifiedOn: 'Flutter 3.32 / 2026-06',
        codeTemplate:
`class PulsePainter extends CustomPainter {
  PulsePainter(this.phase, this.rings, this.hue) : super(repaint: phase);
  final Animation<double> phase;
  final int rings;
  final Color hue;

  @override
  void paint(Canvas c, Size s) {
    final ctr = s.center(Offset.zero);
    for (var i = 0; i < rings; i++) {
      final t = ((phase.value + i / rings) % 1.0);
      final r = t * {{maxRadius}};
      final paint = Paint()
        ..color = hue.withOpacity((1 - t) * {{opacity}})
        ..style = PaintingStyle.stroke
        ..strokeWidth = {{stroke}};
      c.drawCircle(ctr, r, paint);
    }
  }

  @override
  bool shouldRepaint(_) => false; // repaint is wired to controller
}`,
        params: [
          { key: 'rings', label: 'Rings', type: 'slider', min: 2, max: 10, step: 1, default: 5 },
          { key: 'maxRadius', label: 'Max radius', unit: 'px', type: 'slider', min: 40, max: 160, step: 4, default: 110 },
          { key: 'stroke', label: 'Stroke', unit: 'px', type: 'slider', min: 1, max: 8, step: 0.5, default: 2 },
          { key: 'opacity', label: 'Opacity', type: 'slider', min: 0.2, max: 1, step: 0.05, default: 0.8 },
          { key: 'speed', label: 'Speed', unit: 'ms', type: 'slider', min: 600, max: 4000, step: 100, default: 1800 },
          { key: 'color', label: 'Color', type: 'color', default: '#4dd0e1' },
        ],
        pitfalls: [
          { claim: '`shouldRepaint` returning `true` always burns CPU on every parent rebuild.', fix: 'Pass the animation to `super(repaint: phase)` and return `false` from `shouldRepaint` — the canvas redraws only when the Listenable ticks.', source: 'https://api.flutter.dev/flutter/rendering/CustomPainter/repaint.html', confidence: 'official-docs' },
          { claim: 'Allocating Paint objects inside `paint()` causes GC churn at 60fps.', fix: 'Cache the Paint as a field; mutate `.color` / `.strokeWidth` per call instead.', source: 'devtools timeline, measured 2026-05', confidence: 'measured' },
          { claim: 'CustomPainter inside a Transform that scales blurs strokes on hi-DPI.', fix: 'Use `RasterWidget` or paint into the post-scale coordinate space — Flutter\'s default stroke math is in logical px.', source: 'https://github.com/flutter/flutter/issues/119084', confidence: 'github-issue' },
        ],
      },
    ];
    return this._data;
  }

  categoryMeta(cat) {
    const m = {
      'implicit':       { label: 'Implicit',       color: '#4dd0e1' },
      'explicit':       { label: 'Explicit',       color: '#3fb950' },
      'hero':           { label: 'Hero',           color: '#d29922' },
      'staggered':      { label: 'Staggered',      color: '#bc8cff' },
      'physics':        { label: 'Physics',        color: '#ff7b72' },
      'custom-painter': { label: 'CustomPainter',  color: '#79c0ff' },
    };
    return m[cat] || { label: cat, color: '#8b949e' };
  }

  confidenceMeta(c) {
    const m = {
      'official-docs':       { label: 'official docs',       bg: 'rgba(63,185,150,0.15)',  fg: '#3fb950' },
      'measured':            { label: 'measured',            bg: 'rgba(121,192,255,0.15)', fg: '#79c0ff' },
      'github-issue':        { label: 'github issue',        bg: 'rgba(77,208,225,0.15)',  fg: '#4dd0e1' },
      'community-consensus': { label: 'community consensus', bg: 'rgba(125,133,144,0.18)', fg: '#a0a8b3' },
      'author-experience':   { label: 'author experience',   bg: 'rgba(139,148,158,0.15)', fg: '#8b949e' },
    };
    return m[c] || { label: c, bg: '#21262d', fg: '#8b949e' };
  }

  // ---------- Helpers ----------
  setParam(entryId, key, value) {
    this.setState(s => ({
      paramValues: { ...s.paramValues, [entryId]: { ...s.paramValues[entryId], [key]: value } },
      flashKey:   { ...s.flashKey, [`${entryId}-${key}`]: Date.now() },
    }));
    const tkey = `${entryId}-${key}`;
    clearTimeout(this._highlightTimers[tkey]);
    this._highlightTimers[tkey] = setTimeout(() => {
      this.setState(s => {
        const f = { ...s.flashKey };
        delete f[tkey];
        return { flashKey: f };
      });
    }, 700);
  }

  replay(entryId) {
    this.setState(s => ({
      replayKey: { ...s.replayKey, [entryId]: (s.replayKey[entryId] || 0) + 1 }
    }));
  }

  formatParam(entry, key, value) {
    const p = entry.params.find(x => x.key === key);
    if (!p) return String(value);
    if (p.type === 'color') return `Color(0xFF${value.replace('#','').toUpperCase()})`;
    if (p.type === 'toggle') return value ? 'true' : 'false';
    if (p.type === 'slider') {
      const v = Number(value);
      return Number.isInteger(p.step) && Number.isInteger(v) ? String(v) : v.toFixed(2).replace(/\.?0+$/, '');
    }
    return String(value);
  }

  curveToEase(curve) {
    switch (curve) {
      case 'easeInOutCubic': return { ease: [0.65, 0, 0.35, 1] };
      case 'elasticOut':     return { type: 'spring', stiffness: 120, damping: 6, mass: 1 };
      case 'bounceOut':      return { type: 'spring', stiffness: 260, damping: 10, mass: 1 };
      case 'easeInOut':      return { ease: [0.45, 0, 0.55, 1] };

  tintDart(src, baseKey) {
    // Cheap, intentional tinting: keywords, types, strings, comments, numbers
    const tokens = [];
    const re = /(\/\/[^\n]*)|('[^'\n]*')|(\b(?:final|const|return|class|extends|new|void|if|else|for|var|true|false|null|this|super|override)\b)|(\b(?:int|double|String|bool|List|Map|Offset|Duration|Color|Curves|BoxDecoration|BorderRadius|SizedBox|Container|Material|Tween|CurveTween|CurvedAnimation|Interval|FadeTransition|SlideTransition|RotationTransition|AnimationController|Animation|Hero|PageRouteBuilder|Navigator|SpringDescription|SpringSimulation|Transform|AnimatedBuilder|AnimatedContainer|CustomPainter|Canvas|Size|Paint|PaintingStyle|AnimationStatus|ListItem|DetailPage|Column)\b)|(\b\d+(?:\.\d+)?\b)/g;
    let last = 0; let m; let idx = 0;
    while ((m = re.exec(src)) !== null) {
      if (m.index > last) tokens.push({ t: src.slice(last, m.index), c: 'plain' });
      if (m[1]) tokens.push({ t: m[1], c: 'comment' });
      else if (m[2]) tokens.push({ t: m[2], c: 'string' });
      else if (m[3]) tokens.push({ t: m[3], c: 'kw' });
      else if (m[4]) tokens.push({ t: m[4], c: 'type' });
      else if (m[5]) tokens.push({ t: m[5], c: 'num' });
      last = re.lastIndex;
    }
    if (last < src.length) tokens.push({ t: src.slice(last), c: 'plain' });
    const colorMap = {
      plain: '#e6edf3', comment: '#7d8590', string: '#a5d6ff',
      kw: '#ff7b72', type: '#79c0ff', num: '#f0883e',
    };
    return tokens.map((tk, i) => React.createElement('span', {
      key: `t${baseKey}-${i}`, style: { color: colorMap[tk.c] }
    }, tk.t));
  }

        React.createElement('span', { className: 'mono' }, '↗'),
        host
      )
    );
  }

  renderControl(entry, p, vals) {
    const value = vals[p.key];
    const fkey = `${entry.id}-${p.key}`;
    const flashed = !!this.state.flashKey[fkey];
    const labelStyle = { fontSize: 11, color: '#8b949e', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 6 };
    const valueStyle = {
      fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
      color: flashed ? '#ffe066' : '#4dd0e1',
      transition: 'color 0.5s',
    };
    let control;
    if (p.type === 'slider') {
      control = React.createElement('input', {
        type: 'range', min: p.min, max: p.max, step: p.step, value,
        onChange: (e) => this.setParam(entry.id, p.key, Number(e.target.value)),
      });
    } else if (p.type === 'select') {
      control = React.createElement('select', {
        value, onChange: (e) => this.setParam(entry.id, p.key, e.target.value),
        style: { width: '100%' }
      },
        p.options.map(o => React.createElement('option', { key: o, value: o }, o))
      );
    } else if (p.type === 'color') {
      control = React.createElement('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
        React.createElement('input', { type: 'color', value, onChange: (e) => this.setParam(entry.id, p.key, e.target.value), style: { width: 44, height: 30, padding: 2 } }),
        React.createElement('span', { className: 'mono', style: { fontSize: 11, color: '#8b949e' } }, value.toUpperCase())
      );
    } else if (p.type === 'toggle') {
      control = React.createElement('div', {
        className: 'toggle ' + (value ? 'on' : ''),
        onClick: () => this.setParam(entry.id, p.key, !value),
      }, React.createElement('div', { className: 'toggle-knob' }));
    }
    return React.createElement('div', { key: p.key },
      React.createElement('div', { style: labelStyle },
        React.createElement('span', null, p.label),
        p.type !== 'toggle' && p.type !== 'color' &&
          React.createElement('span', { style: valueStyle }, this.formatParam(entry, p.key, value), p.unit ? ' ' + p.unit : '')
      ),
      control
    );
  }

  dartFinalCode(entry, vals) {
    return entry.codeTemplate.replace(/\{\{(\w+)\}\}/g, (_, k) => this.formatParam(entry, k, vals[k]));
  }

  render() {
    return this.renderVals().app;
  }

  // ---------- Root ----------
  renderVals() {
    // Define preview helper components — declared here so they capture React/fm via closure
    const fm = this.fm;
    if (typeof window !== 'undefined' && fm && !window.__previewHelpersInstalled) {
      window.__previewHelpersInstalled = true;
    }

    const app = React.createElement('div', { style: { minHeight: '100vh', background: '#0d1117', color: '#e6edf3' } },
      // Top nav
      React.createElement('header', { style: {
        position: 'sticky', top: 0, zIndex: 20,
        backdropFilter: 'blur(8px)', background: 'rgba(13,17,23,0.85)',
        borderBottom: '1px solid #21262d',
        padding: '12px 32px', display: 'flex', alignItems: 'center', gap: 16
      } },
        React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }, onClick: () => this.setState({ view: 'gallery' }) },
          React.createElement('div', { style: {
            width: 26, height: 26, borderRadius: 7,
            background: 'conic-gradient(from 230deg at 50% 50%, #4dd0e1, #3fb950, #d29922, #4dd0e1)',
            boxShadow: '0 0 0 1px #21262d inset'
          } }),
          React.createElement('div', { style: { display: 'flex', flexDirection: 'column', lineHeight: 1 } },
            React.createElement('span', { style: { fontSize: 13, fontWeight: 600 } }, 'Flutter Motion Kit'),
            React.createElement('span', { className: 'mono', style: { fontSize: 10, color: '#6e7681', marginTop: 2 } }, 'v3.32.0')
          )
        ),
        React.createElement('nav', { style: { display: 'flex', gap: 18, marginLeft: 24, fontSize: 13, color: '#8b949e' } },
          [['Gallery', '/gallery'], ['Docs', '/docs'], ['Verifier', '/verifier'], ['Changelog', '/changelog']].map(([n, href], i) =>
            React.createElement('a', { key: n, href, onClick: (e) => { if (href === '#') e.preventDefault(); },
              style: { color: i === 0 ? '#e6edf3' : '#8b949e', textDecoration: 'none' } }, n)
          )
        ),
        React.createElement('div', { style: { marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' } },
          React.createElement('span', { className: 'mono', style: { fontSize: 11, color: '#6e7681' } }, '⌘K'),
          React.createElement('button', {
            style: { background: '#161b22', border: '1px solid #30363d', color: '#e6edf3', padding: '6px 12px', borderRadius: 6, fontSize: 12, cursor: 'pointer' }
          }, 'Sign in')
        )
      ),
      this.state.view === 'gallery' ? this.renderGallery() : this.renderDetail(),
      // Toast
      this.state.copyToast && React.createElement('div', {
        className: 'toast mono',
        style: {
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          background: '#161b22', border: '1px solid #4dd0e1', color: '#4dd0e1',
          padding: '8px 14px', borderRadius: 8, fontSize: 12, zIndex: 50,
          boxShadow: '0 12px 40px -10px rgba(77,208,225,0.35)'
        }
      }, '✓ ', this.state.copyToast)
    );
    return { app };
  }
}

// ---------- Sub-components for specific previews ----------
function HeroDemo({ fm, vals, replay, mini }) {
  const { motion } = fm;
  const [expanded, setExpanded] = React.useState(false);
  // Auto-toggle on each replay tick so the Hero keeps expanding/collapsing on its own
  React.useEffect(() => { setExpanded(replay % 2 === 1); }, [replay]);
  const m = mini ? 0.5 : 1;
  const startW = vals.startW * m;
  const startH = vals.startH * m;
  const dur = vals.duration / 1000;
  return React.createElement('div', {
    onClick: () => setExpanded(v => !v),
    style: { cursor: 'pointer', width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }
  },
    React.createElement(motion.div, {
      layout: true,
      transition: { duration: dur, ease: [0.45, 0, 0.15, 1] },
      animate: {
        width: expanded ? (mini ? 200 : 360) : startW,
        height: expanded ? (mini ? 110 : 240) : startH,
        borderRadius: vals.radius,
      },
      style: {
        background: vals.color,
        boxShadow: '0 10px 36px -12px rgba(77,208,225,0.45)',
        display: 'flex', alignItems: 'flex-end', padding: 10,
      }
    },
      !mini && React.createElement('span', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: 'rgba(13,17,23,0.7)' } }, expanded ? 'tap to collapse' : 'tap to expand')
    )
  );
}

function StaggerDemo({ fm, vals, replay, mini }) {
  const { motion } = fm;
  const m = mini ? 0.7 : 1;
  const count = Math.round(vals.count);
  const totalDur = vals.duration / 1000;
  const stagger = vals.stagger;
  const items = [];
  for (let i = 0; i < count; i++) items.push(i);
  const slideY = vals.direction === 'slide-down' ? -vals.slide * 40 : vals.direction === 'fade-only' ? 0 : vals.slide * 40;

  return React.createElement('div', {
    key: replay,
    style: { display: 'flex', flexDirection: 'column', gap: 6 * m, width: 200 * m }
  },
    items.map(i => {
      const delay = (i / count) * stagger * totalDur;
      return React.createElement(motion.div, {
        key: i,
        initial: { opacity: 0, y: slideY },
        animate: { opacity: 1, y: 0 },
        transition: { duration: 0.3 * totalDur, delay, ease: [0.33, 1, 0.68, 1] },
        style: {
          height: 14 * m, borderRadius: 4,
          background: `linear-gradient(90deg, #21262d 0%, #21262d ${30 + (i*7) % 50}%, transparent ${30 + (i*7) % 50}%)`,
          border: '1px solid #30363d',
        }
      });
    })
  );
}

function PulseDemo({ fm, vals, replay, mini }) {
  const { motion } = fm;
  const m = mini ? 0.6 : 1;
  const maxR = vals.maxRadius * m;
  const speed = vals.speed / 1000;
  const rings = Math.round(vals.rings);
  const stroke = vals.stroke;
  const opacity = vals.opacity;
  return React.createElement('div', {
    key: replay,
    style: { position: 'relative', width: maxR * 2.2, height: maxR * 2.2, display: 'flex', alignItems: 'center', justifyContent: 'center' }
  },
    [...Array(rings)].map((_, i) => React.createElement(motion.div, {
      key: i,
      initial: { scale: 0, opacity: opacity },
      animate: { scale: 1, opacity: 0 },
      transition: { duration: speed, repeat: Infinity, delay: (speed * i) / rings, ease: 'easeOut' },
      style: {
        position: 'absolute',
        width: maxR * 2, height: maxR * 2,
        borderRadius: '50%',
        border: `${stroke}px solid ${vals.color}`,
      }
    })),
    React.createElement('div', { style: {
      width: 18 * m, height: 18 * m, borderRadius: '50%',
      background: vals.color, boxShadow: `0 0 24px ${vals.color}`
    } })
  );
}
