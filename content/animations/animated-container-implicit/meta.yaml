id: animated-container-implicit
title: AnimatedContainer (implicit)
category: implicit            # implicit | explicit | hero | staggered | physics | custom-painter | rive-lottie
difficulty: 1
tags: [implicit, container, beginner, tap]
summary: >
  Smoothly transition a box's size / color / corner radius on tap. If an implicit
  animation can do the job, don't hand-roll an AnimationController — it's shorter
  and harder to get wrong.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""                   # auto-filled by scripts/sync-gists.mjs
docs:
  - https://docs.flutter.dev/ui/animations/implicit-animations
  - https://api.flutter.dev/flutter/widgets/AnimatedContainer-class.html
pitfalls:
  - claim: Only tweenable properties animate; changing the child's type or key won't trigger a transition.
    fix: Use AnimatedSwitcher to swap the whole child; AnimatedContainer only animates its own properties.
    source: https://api.flutter.dev/flutter/widgets/AnimatedContainer-class.html
    confidence: official-docs
  - claim: Setting the target value on the very first frame shows no animation — implicit animations only play when a property changes.
    fix: Start with the initial value, then change it to the target after the first build (e.g. on tap, or setState after initState).
    source: https://docs.flutter.dev/ui/animations/implicit-animations
    confidence: official-docs
  - claim: Hand-writing an AnimationController for a transition this simple is over-engineering and easy to leak (missing dispose).
    fix: For simple property transitions, always reach for the implicit family first (AnimatedContainer / AnimatedOpacity / ...).
    source: author-experience
    confidence: author-experience
