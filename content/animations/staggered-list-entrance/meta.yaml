id: staggered-list-entrance
title: Staggered list entrance
category: staggered
difficulty: 3
tags: [list, staggered, entrance, AnimatedBuilder, controller]
summary: >
  List items fade-and-slide in one after another. A single AnimationController +
  Interval drives the stagger — cheaper than one controller per item.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://docs.flutter.dev/ui/animations/staggered-animations
  - https://api.flutter.dev/flutter/widgets/AnimatedBuilder-class.html
  - https://api.flutter.dev/flutter/animation/Interval-class.html
pitfalls:
  - claim: Newing the subtree directly inside the AnimatedBuilder builder closure rebuilds the whole subtree every frame.
    fix: Pass the animation-invariant content as child and reuse it in the builder (animate only Transform/Opacity).
    source: https://api.flutter.dev/flutter/widgets/AnimatedBuilder-class.html
    confidence: official-docs
  - claim: Forgetting dispose() leaks the Ticker held by the AnimationController.
    fix: Call _controller.dispose() in State.dispose(); use SingleTickerProviderStateMixin for a single controller.
    source: https://api.flutter.dev/flutter/widgets/SingleTickerProviderStateMixin-mixin.html
    confidence: official-docs
    provenBy: test/leak_test.dart      # proven by an automated test
  - claim: Interval's begin/end must lie within [0,1]; out-of-range values don't error but behave wrong.
    fix: Stagger formula begin = i * gap, end = begin + slice, ensuring end <= 1.
    source: https://api.flutter.dev/flutter/animation/Interval-class.html
    confidence: official-docs
  - claim: Calling setState in the controller's listener triggers a full rebuild of the entire widget.
    fix: Use AnimatedBuilder/FadeTransition to confine rebuilds to the animation subtree.
    source: https://docs.flutter.dev/ui/animations/tutorial
    confidence: official-docs
