id: shimmer-skeleton
title: Shimmer skeleton loading
category: explicit
difficulty: 3
tags: [shimmer, skeleton, loading, shadermask, gradient]
summary: >
  Show a sweeping shimmer placeholder while data loads. A single controller +
  a ShaderMask gradient sweep is cheaper than one controller per item.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://api.flutter.dev/flutter/widgets/ShaderMask-class.html
  - https://api.flutter.dev/flutter/widgets/RepaintBoundary-class.html
pitfalls:
  - claim: The ShaderMask sweep repaints every frame and, without isolation, drags surrounding widgets into the repaint — especially noticeable in lists.
    fix: Wrap each skeleton unit in a RepaintBoundary to pin the repaint to itself.
    source: https://api.flutter.dev/flutter/widgets/RepaintBoundary-class.html
    confidence: official-docs
  - claim: Not passing a child to AnimatedBuilder rebuilds the skeleton-shape subtree every frame.
    fix: Pass the skeleton shape as the child and only update the gradient in the builder.
    source: https://api.flutter.dev/flutter/widgets/AnimatedBuilder-class.html
    confidence: official-docs
  - claim: Forgetting dispose() leaks the controller's Ticker.
    fix: Call _controller.dispose() in dispose().
    source: https://api.flutter.dev/flutter/widgets/SingleTickerProviderStateMixin-mixin.html
    confidence: official-docs
  - claim: repeat() keeps spinning even when the page is backgrounded / invisible, wasting frames.
    fix: Stop or remove it once loading finishes, or gate playback with TickerMode / visibility awareness.
    source: https://api.flutter.dev/flutter/widgets/TickerMode-class.html
    confidence: official-docs
