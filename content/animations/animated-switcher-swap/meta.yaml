id: animated-switcher-swap
title: AnimatedSwitcher 内容切换
category: implicit
difficulty: 2
tags: [switcher, fade, scale, state, key]
summary: >
  在新旧内容之间做淡入缩放过渡（如计数器、加载/成功状态切换）。关键是给子组件唯一 Key。
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://api.flutter.dev/flutter/widgets/AnimatedSwitcher-class.html
pitfalls:
  - claim: 子组件不带唯一 Key 时，AnimatedSwitcher 判定为「同一个 widget」，根本不触发过渡。
    fix: 给 child 设 ValueKey（用能区分新旧内容的值），内容变化才会被识别。
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher-class.html
    confidence: official-docs
  - claim: 它只对「child 整体替换」生效，对 child 内部状态变化无效。
    fix: 状态变化要体现成不同的 child（或不同 Key）。
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher/transitionBuilder.html
    confidence: official-docs
  - claim: transitionBuilder 同时作用于进入和离开，离开用的是上一个 child。
    fix: 组合 FadeTransition/ScaleTransition 时确保对两端都成立，避免离开态错位。
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher/transitionBuilder.html
    confidence: official-docs
