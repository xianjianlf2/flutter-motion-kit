id: animated-switcher-swap
title: AnimatedSwitcher (content swap)
category: implicit
difficulty: 2
tags: [switcher, fade, scale, state, key]
summary: >
  Fade-and-scale between old and new content (counters, loading → success states).
  The key is giving each child a unique Key.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://api.flutter.dev/flutter/widgets/AnimatedSwitcher-class.html
pitfalls:
  - claim: Without a unique Key on the child, AnimatedSwitcher treats it as the same widget and never transitions.
    fix: Give the child a ValueKey (keyed on something that distinguishes old from new) so content changes are detected.
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher-class.html
    confidence: official-docs
  - claim: It only reacts to replacing the whole child, not to state changes inside the child.
    fix: Express state changes as a different child (or a different Key).
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher/transitionBuilder.html
    confidence: official-docs
  - claim: transitionBuilder runs for both the incoming and outgoing children; the outgoing one is the previous child.
    fix: When composing FadeTransition/ScaleTransition, make sure it holds for both ends so the exit state doesn't glitch.
    source: https://api.flutter.dev/flutter/widgets/AnimatedSwitcher/transitionBuilder.html
    confidence: official-docs
