id: hero-shared-element
title: Hero shared-element transition
category: hero
difficulty: 2
tags: [hero, navigation, shared-element, transition]
summary: >
  Tap a grid item and the element "flies" to its spot on the detail page. Both ends
  share one Hero tag and the framework takes over the transition.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://docs.flutter.dev/ui/animations/hero-animations
  - https://api.flutter.dev/flutter/widgets/Hero-class.html
pitfalls:
  - claim: Two Heroes with the same tag on screen at once throw an exception.
    fix: Tags must be globally unique (compose with an id, e.g. 'box-$i'); never duplicate on the same screen.
    source: https://api.flutter.dev/flutter/widgets/Hero-class.html
    confidence: official-docs
  - claim: A Hero inside a nested Navigator (e.g. within a BottomNavigationBar) won't fly across the outer route.
    fix: Keep both ends under the same Navigator, or supply a flightShuttleBuilder for the flying widget.
    source: https://api.flutter.dev/flutter/widgets/Hero/flightShuttleBuilder.html
    confidence: official-docs
  - claim: When start/end size or corner radius differ a lot, the default rect interpolation can jump or clip.
    fix: Use createRectTween for a smoother flight path and keep a consistent BoxFit / shape on the child.
    source: https://api.flutter.dev/flutter/widgets/Hero/createRectTween.html
    confidence: official-docs
  - claim: The origin leaves a gap while the Hero is in flight.
    fix: Fill it with placeholderBuilder when you need a placeholder.
    source: https://api.flutter.dev/flutter/widgets/Hero/placeholderBuilder.html
    confidence: official-docs
