id: page-route-transition
title: Custom page transition (fade + slide-up)
category: explicit
difficulty: 2
tags: [navigation, route, transition, page]
summary: >
  Use PageRouteBuilder to customize the enter animation (fade + a slight slide-up)
  instead of the default platform transition.
verifiedOn: "Flutter 3.32 / 2026-06"
gistId: ""
docs:
  - https://api.flutter.dev/flutter/widgets/PageRouteBuilder-class.html
  - https://docs.flutter.dev/cookbook/animation/page-route-animation
pitfalls:
  - claim: Driving the Tween with a raw linear animation feels stiff.
    fix: Wrap it in a CurvedAnimation (e.g. easeOutCubic) before driving Fade/Slide.
    source: https://docs.flutter.dev/cookbook/animation/page-route-animation
    confidence: official-docs
  - claim: Setting only transitionDuration and forgetting reverseTransitionDuration makes the back transition a different length.
    fix: Set both durations explicitly.
    source: https://api.flutter.dev/flutter/widgets/PageRouteBuilder/reverseTransitionDuration.html
    confidence: official-docs
  - claim: Rebuilding a big subtree inside transitionsBuilder instead of using the passed-in child rebuilds the page every frame.
    fix: Always reuse the child argument from the callback.
    source: https://api.flutter.dev/flutter/widgets/PageRouteBuilder/transitionsBuilder.html
    confidence: official-docs
  - claim: Hand-writing the same transition everywhere for an app-wide look is hard to maintain and inconsistent.
    fix: Configure ThemeData.pageTransitionsTheme with a PageTransitionsBuilder to override it app-wide.
    source: https://api.flutter.dev/flutter/material/PageTransitionsTheme-class.html
    confidence: official-docs
